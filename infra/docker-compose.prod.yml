services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notepads
      POSTGRES_USER: notepads
      POSTGRES_PASSWORD: notepads
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql://notepads:notepads@db:5432/notepads
    expose:
      - "8000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
