services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notepads
      POSTGRES_USER: notepads
      POSTGRES_PASSWORD: notepads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql://notepads:notepads@db:5432/notepads
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
